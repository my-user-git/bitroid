<!-- Bitrix: компонент header -->
<header class="header" id="header">
    <div class="container header__container">
        <a href="/" class="header__logo">
            <img src="images/logo.svg" alt="WebStudio" class="header__logo-img" width="180" height="40">
        </a>
        
        <nav class="header__nav" id="mainNav">
            <ul class="header__menu">
                <li class="header__menu-item"><a href="#services" class="header__menu-link">Услуги</a></li>
                <li class="header__menu-item"><a href="#cases" class="header__menu-link">Кейсы</a></li>
                <li class="header__menu-item"><a href="#faq" class="header__menu-link">FAQ</a></li>
                <li class="header__menu-item"><a href="#contacts" class="header__menu-link">Контакты</a></li>
            </ul>
        </nav>
        
        <div class="header__search">
            <button class="header__search-btn" id="searchBtn" aria-label="Поиск">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
            <div class="header__search-form" id="searchForm">
                <input type="text" placeholder="Поиск..." class="header__search-input">
                <button class="header__search-close">✕</button>
            </div>
        </div>
        
        <button class="header__btn" id="callbackBtn">Заказать звонок</button>
        
        <button class="header__burger" id="burgerBtn" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>
